<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
        }

        .form-container {
            width: 420px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .back {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="form-container">

    <h2>➕ Nuevo Producto</h2>

    <!-- ✅ FORM -->
    <form th:action="@{/productos/create}" method="post">

        <!-- NOM -->
        <label>Nombre</label>
        <input type="text" name="nombre" placeholder="Ej: Bicicleta Pro 3000" required>

        <!-- NUM SERIE -->
        <label>Número de serie</label>
        <input type="text" name="num_serie" placeholder="Ej: ABC123456">

        <!-- PRECIO -->
        <label>Precio</label>
        <input type="number" step="0.01" name="precio" placeholder="Ej: 499.99" required>

        <!-- COSTE PROD -->
        <label>Coste producción</label>
        <input type="number" step="0.01" name="coste_prod" placeholder="Ej: 250.50">

        <!-- PESO -->
        <label>Peso (kg)</label>
        <input type="number" step="0.01" name="peso" placeholder="Ej: 12.5">

        <!-- TAMAÑO -->
        <label>Tamaño</label>
        <input type="text" name="tamano" placeholder="Ej: M / L / XL">

        <!-- LINEA -->
        <label>Línea</label>
        <select name="linea">
            <option value="">-- Selecciona --</option>
            <option value="1">Carretera</option>
            <option value="2">Montaña</option>
            <option value="3">Paseo</option>
        </select>

        <!-- CALIDAD -->
        <label>Calidad</label>
        <select name="calidad">
            <option value="">-- Selecciona --</option>
            <option value="1">Baja</option>
            <option value="2">Media</option>
            <option value="3">Alta</option>
        </select>

        <!-- GENERO -->
        <label>Género</label>
        <select name="genero">
            <option value="">-- Selecciona --</option>
            <option value="1">Unisex</option>
            <option value="2">Hombre</option>
            <option value="3">Mujer</option>
        </select>

        <!-- SUBCAT -->
        <label>Subcategoría</label>
        <input type="number" name="id_subcat" placeholder="Ej: 1">

        <!-- IMAGEN -->
        <label>URL Imagen</label>
        <input type="text" name="imagenUrl" placeholder="https://...">

        <!-- CHECK -->
        <label>
            <input type="checkbox" name="oferta">
            En oferta
        </label>

        <label>
            <input type="checkbox" name="fab_com">
            Fabricado
        </label>

        <button type="submit">Guardar Producto</button>

    </form>

    <a href="/productos" class="back">⬅ Volver</a>

</div>

</body>
</html>
